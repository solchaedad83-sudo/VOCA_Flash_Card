<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>VOCA Quick Add</title>
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <main class="mobile-shell">
        <header class="mobile-header">
            <p class="eyebrow">Anki VOCA</p>
            <h1>AI Quick Add</h1>
            <p class="subtitle">영어 단어만 입력하면 AI가 뜻과 예문을 채우고 GitHub의 voca.csv를 업데이트합니다.</p>
        </header>

        <section class="status-card">
            <span class="status-dot" id="status-dot"></span>
            <div>
                <strong id="status-title">서버 확인 중</strong>
                <p id="status-detail">Vercel API 연결을 확인합니다.</p>
            </div>
        </section>

        <form id="quick-add-form" class="quick-form">
            <label>
                <span>영어 단어/표현</span>
                <input id="word-input" type="text" autocomplete="off" autocapitalize="none" placeholder="serendipity" required>
            </label>

            <label id="secret-field" class="secret-field">
                <span>저장 비밀번호</span>
                <input id="secret-input" type="password" autocomplete="current-password" placeholder="선택 설정">
            </label>

            <button id="save-btn" type="submit">AI로 생성하고 저장</button>
        </form>

        <section class="recent-card">
            <h2>최근 추가</h2>
            <ul id="recent-list">
                <li>아직 추가한 단어가 없습니다.</li>
            </ul>
        </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="mobile.js"></script>
</body>
</html>

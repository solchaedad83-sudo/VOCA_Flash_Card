<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>VOCA Quick Add</title>
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <main class="mobile-shell">
        <header class="mobile-header">
            <div class="mobile-topbar">
                <div>
                    <p class="eyebrow">VOCA</p>
                    <h1>단어 추가</h1>
                </div>
                <a class="study-link" href="/study">학습</a>
            </div>
            <p class="subtitle">영어 단어 하나만 입력하세요.</p>
        </header>

        <section class="status-card">
            <span class="status-dot" id="status-dot"></span>
            <div>
                <strong id="status-title">준비 중</strong>
                <p id="status-detail">저장 준비 상태를 확인합니다.</p>
            </div>
        </section>

        <form id="quick-add-form" class="quick-form">
            <label>
                <span>영어 단어</span>
                <input id="word-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="serendipity" required>
            </label>

            <button id="save-btn" type="submit">저장</button>
        </form>

        <section class="recent-card">
            <h2>최근 추가</h2>
            <ul id="recent-list">
                <li>아직 추가한 단어가 없습니다.</li>
            </ul>
        </section>
    </main>

    <div class="toast" id="toast"></div>
    <script src="mobile.js"></script>
</body>
</html>
